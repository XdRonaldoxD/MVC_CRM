version: '3.3'

services:

  app:
    build: .
    container_name: mvc_crm_app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-mvc_crm}
      DB_USER: ${DB_USER:-crm_user}
      DB_PASS: ${DB_PASS:-secret}
    volumes:
      # Uploads persistentes fuera del contenedor
      - archivos_uploads:/var/www/html/archivo
    depends_on:
      db:
        condition: service_healthy
    networks:
      - crm_net

  db:
    image: mysql:8.0
    container_name: mvc_crm_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-mvc_crm}
      MYSQL_USER: ${DB_USER:-crm_user}
      MYSQL_PASSWORD: ${DB_PASS:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-rootsecret}
    volumes:
      # Datos de MySQL persistentes
      - mysql_data:/var/lib/mysql
      # Scripts SQL iniciales (si tienes schema en sql/)
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASS:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm_net

volumes:
  mysql_data:
  archivos_uploads:

networks:
  crm_net:
    driver: bridge
