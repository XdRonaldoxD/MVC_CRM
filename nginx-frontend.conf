server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Limite de subida (coincide con el backend)
    client_max_body_size 128M;

    # Frontend Angular: rutas que no son archivos van al index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API: reenvia al contenedor backend por la red interna de Docker.
    # El prefijo /api/ se elimina al reenviar (proxy_pass termina en "/").
    location /api/ {
        proxy_pass http://backend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
