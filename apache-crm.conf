<VirtualHost *:80>
    DocumentRoot /var/www/html/frontend

    <Directory /var/www/html/frontend>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks

        # Angular: todas las rutas van al index.html
        FallbackResource /index.html
    </Directory>

    <Directory /var/www/html/frontend/api>
        AllowOverride All
        Require all granted
        Options -Indexes
        FallbackResource /api/index.php
    </Directory>
</VirtualHost>
