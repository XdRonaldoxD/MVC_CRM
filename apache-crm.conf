<VirtualHost *:80>
    DocumentRoot /var/www/html

    # Backend PHP — todas las rutas van al index.php (front controller)
    <Directory /var/www/html>
        AllowOverride All
        Require all granted
        Options -Indexes

        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ /index.php [L]
    </Directory>
</VirtualHost>
