<VirtualHost *:80>
    DocumentRoot /var/www/html/frontend

    <Directory /var/www/html/frontend>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks

        # Angular: rutas que no son archivos reales van al index.html
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_URI} !^/api
        RewriteRule ^ /index.html [L]
    </Directory>

    <Directory /var/www/html/frontend/api>
        AllowOverride All
        Require all granted
        Options -Indexes

        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ /frontend/api/index.php [L]
    </Directory>
</VirtualHost>
